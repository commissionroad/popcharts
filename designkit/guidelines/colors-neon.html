<!-- @dsCard group="Colors" viewport="700x190" subtitle="The sprinkle spectrum — magenta leads, accents punctuate" name="Neon accents" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-sans);color:var(--text-primary);padding:22px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{height:84px;border-radius:var(--radius-lg)}
  .name{font-weight:600;font-size:13px;margin-top:11px}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
  .role{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:4px;letter-spacing:.04em}
</style></head><body>
  <div class="row">
    <div><div class="sw" style="background:var(--pc-magenta);box-shadow:var(--glow-magenta)"></div><div class="name">Hot Magenta</div><div class="hex">#FF2E97</div><div class="role">PRIMARY · NO</div></div>
    <div><div class="sw" style="background:var(--pc-cyan);box-shadow:var(--glow-cyan)"></div><div class="name">Cyber Cyan</div><div class="hex">#1FE0FF</div><div class="role">BOOTSTRAP</div></div>
    <div><div class="sw" style="background:var(--pc-lime);box-shadow:var(--glow-lime)"></div><div class="name">Acid Lime</div><div class="hex">#C6FF3D</div><div class="role">YES · GRADUATED</div></div>
    <div><div class="sw" style="background:var(--pc-amber);box-shadow:var(--glow-amber)"></div><div class="name">Solar Amber</div><div class="hex">#FFB020</div><div class="role">GRADUATING</div></div>
    <div><div class="sw" style="background:var(--pc-violet);box-shadow:var(--glow-violet)"></div><div class="name">Ultra Violet</div><div class="hex">#B85CFF</div><div class="role">RESOLVED</div></div>
  </div>
</body></html>
