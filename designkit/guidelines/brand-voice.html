<!-- @dsCard group="Brand" viewport="700x180" subtitle="Punchy, degen-fast, technically honest" name="Catchphrases & voice" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-display);color:var(--text-primary);padding:24px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .c{border:1px solid var(--pc-line);border-radius:var(--radius-lg);padding:18px;font-weight:800;font-size:20px}
  .fill{background:var(--pc-magenta);color:var(--pc-ink);border-color:var(--pc-magenta)}
  .honest{grid-column:1/-1;font-family:var(--font-sans);font-weight:400;font-size:12px;color:var(--text-secondary);border-style:dashed}
</style></head><body>
  <div class="grid">
    <div class="c">Pop off.</div>
    <div class="c fill">Bake a market.</div>
    <div class="c">Zero liquidity.<br><span style="color:var(--pc-cyan)">Full send.</span></div>
    <div class="c honest">Honesty rule — pre-graduation bets are receipts, not fills. Worst case is a full refund. The brand never overpromises a fill.</div>
  </div>
</body></html>
