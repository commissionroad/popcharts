<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Rounded snack-pop corners — nothing is sharp" name="Radius & glow" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-mono);color:var(--text-primary);padding:24px;display:flex;gap:34px;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:62px;height:62px;background:var(--pc-coal);border:1px solid var(--pc-line)}
  .n{font-size:10px;color:var(--text-muted)}
  .glow{display:flex;gap:18px;margin-left:8px}
  .g{width:46px;height:46px;border-radius:var(--radius-md)}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm 10</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md 14</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg 18</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl 22</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div></div>
  <div class="glow">
    <div class="g" style="background:var(--pc-magenta);box-shadow:var(--glow-magenta)"></div>
    <div class="g" style="background:var(--pc-cyan);box-shadow:var(--glow-cyan)"></div>
    <div class="g" style="background:var(--pc-lime);box-shadow:var(--glow-lime)"></div>
  </div>
</body></html>
