<!-- @dsCard group="Brand" viewport="700x230" subtitle="Glyph, primary lockup, app-icon tile" name="Logo & lockups" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-display);color:var(--text-primary);padding:26px;display:flex;align-items:center;gap:46px}
  .lock{display:flex;align-items:center;gap:16px}
  .wm{font-weight:800;font-size:38px;letter-spacing:var(--tracking-snug);line-height:.9}
  .mag{color:var(--pc-magenta)}
  .swoosh{margin-top:3px}
  .tile{width:96px;height:96px;border-radius:var(--radius-xl);background:linear-gradient(150deg,#1A1A22,#0B0B0F);border:1px solid var(--pc-line-strong);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-tile)}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-top:12px;text-align:center}
  .grp{display:flex;flex-direction:column;align-items:center}
</style></head><body>
  <div class="grp">
    <div class="lock">
      <img src="../assets/pop-charts-glyph.svg" width="64" height="64" alt="">
      <div>
        <div class="wm">Pop<span class="mag">Charts</span></div>
        <svg class="swoosh" viewBox="0 0 200 14" width="172" height="12" fill="none"><path d="M5 8 C 55 2, 150 2, 195 10" stroke="#FF2E97" stroke-width="4" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="cap">Primary lockup</div>
  </div>
  <div class="grp">
    <div class="tile"><img src="../assets/pop-charts-glyph.svg" width="64" height="64" alt=""></div>
    <div class="cap">App icon</div>
  </div>
</body></html>
