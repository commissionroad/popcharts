<!-- @dsCard group="Colors" viewport="700x150" subtitle="Near-black neutral ramp — surfaces separated by hairlines, not shadows" name="Ink ramp" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-sans);color:var(--text-primary);padding:22px}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .sw{height:60px;border-radius:var(--radius-md);border:1px solid var(--pc-line)}
  .name{font-weight:600;font-size:11px;margin-top:9px}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px}
</style></head><body>
  <div class="row">
    <div><div class="sw" style="background:var(--pc-ink)"></div><div class="name">Ink</div><div class="hex">#08080A</div></div>
    <div><div class="sw" style="background:var(--pc-carbon)"></div><div class="name">Carbon</div><div class="hex">#0E0E13</div></div>
    <div><div class="sw" style="background:var(--pc-coal)"></div><div class="name">Coal</div><div class="hex">#131319</div></div>
    <div><div class="sw" style="background:var(--pc-slate)"></div><div class="name">Slate</div><div class="hex">#1B1B22</div></div>
    <div><div class="sw" style="background:var(--pc-line)"></div><div class="name">Line</div><div class="hex">#26262F</div></div>
    <div><div class="sw" style="background:var(--pc-mist)"></div><div class="name">Mist</div><div class="hex">#9A9AA4</div></div>
    <div><div class="sw" style="background:var(--pc-paper)"></div><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
  </div>
</body></html>
