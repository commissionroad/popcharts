<!-- @dsCard group="Type" viewport="700x200" subtitle="Space Grotesk for UI/body, Space Mono for data" name="UI & Mono" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);color:var(--text-primary);padding:24px;display:flex;gap:40px}
  .col{flex:1}
  .spec{font-size:34px;font-weight:600;line-height:1}
  .lab{font-weight:600;font-size:15px;margin-top:14px}
  .sub{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .g{font-family:var(--font-sans)}
  .m{font-family:var(--font-mono)}
  .data{font-family:var(--font-mono);font-size:13px;color:var(--pc-cyan);margin-top:8px}
</style></head><body>
  <div class="col g">
    <div class="spec">Bake your own odds</div>
    <div class="lab">Space Grotesk</div>
    <div class="sub">Body · UI · buttons — 400 / 500 / 600 / 700</div>
  </div>
  <div class="col m">
    <div class="spec" style="color:var(--pc-cyan)">b = 5,000</div>
    <div class="lab">Space Mono</div>
    <div class="sub">Prices · labels · addresses</div>
    <div class="data">Yes 64¢ · No 36¢ · Vol $482.3K</div>
  </div>
</body></html>
