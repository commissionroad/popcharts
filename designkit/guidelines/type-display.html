<!-- @dsCard group="Type" viewport="700x210" subtitle="Unbounded — wordmark, headlines, big odds" name="Display / Unbounded" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-display);color:var(--text-primary);padding:24px}
  .big{font-weight:800;font-size:60px;line-height:.9;letter-spacing:var(--tracking-tight)}
  .mag{color:var(--pc-magenta)}
  .row{display:flex;align-items:baseline;gap:28px;margin-top:18px}
  .odds{font-weight:800;font-size:40px;font-variant-numeric:tabular-nums}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.04em}
</style></head><body>
  <div class="big">Pop<span class="mag">Charts</span></div>
  <div class="row">
    <span class="odds" style="color:var(--yes)">64%</span>
    <span class="odds" style="color:var(--no)">36%</span>
    <span class="meta">Unbounded 500 / 700 / 800 / 900 · tabular figures</span>
  </div>
</body></html>
