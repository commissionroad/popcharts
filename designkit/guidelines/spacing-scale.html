<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base grid" name="Spacing scale" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--pc-ink);font-family:var(--font-mono);color:var(--text-primary);padding:24px}
  .row{display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--pc-magenta);border-radius:3px;width:22px}
  .n{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="n">40</div></div>
    <div class="item"><div class="bar" style="height:56px"></div><div class="n">56</div></div>
    <div class="item"><div class="bar" style="height:72px"></div><div class="n">72</div></div>
  </div>
</body></html>
