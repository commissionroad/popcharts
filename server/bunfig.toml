[test]
# Hermetic test env — pins network config to dead endpoints before any
# module loads (see test-setup.ts).
preload = ["./test-setup.ts"]
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
# ../protocol imports are excluded so bun's own totals (and the threshold
# below) match the workspace-own denominator rule from ADR 0017 — protocol
# files are protocol CI's figure, not the server's. ../packages/live-channels
# is excluded for the same reason, and it is doing real work: bun resolves a
# `file:` dep to this relative path and would otherwise count it here (measured
# — dropping the pattern puts it in the table at 100/100 and lifts the totals).
# Excluding is both rule-consistent and the conservative choice, since those
# free 100% lines would inflate the ratcheted floor below. One consequence
# worth stating: with no CI lane of its own, that package's lines land in no
# workspace's figure. Its behaviour is still verified here (sources.test.ts
# exercises every export). Give it a lane if it ever grows real logic.
coveragePathIgnorePatterns = [
  "scripts/**",
  "../protocol/**",
  "../packages/live-channels/**",
]

# Ratcheted floor (ADR 0017 Track B): never lower these; bump manually as
# coverage lands. Baseline measured 2026-07-14 (post-route-tests): functions
# 76.73, lines 76.67
# (bun's own metrics, which differ from the lcov-derived badge figure).
# Floors sit one display-rounding hundredth under the measured values so
# equality at bun's printed precision cannot flap. Keys are singular
# (line/function) — bun exits 1 with no diagnostic when
# the threshold is unmet OR when given unknown keys like lines/functions.
coverageThreshold = { function = 0.7672, line = 0.7666 }
