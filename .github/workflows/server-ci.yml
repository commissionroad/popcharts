name: Server CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single source of truth for which paths this CI cares about. The
      # workflow always triggers; this job decides whether the real job runs.
      # A conditionally skipped job satisfies required status checks, so no
      # skip-twin workflow is needed (and none exists to drift out of sync).
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            relevant:
            - server/**
            # server-ci installs the root pnpm workspace before bun install.
            - pnpm-workspace.yaml
            # The server consumes @popcharts/protocol TypeScript source
            # (venue ABIs, price/tick helpers), so protocol changes must
            # re-run the server checks.
            - protocol/**
            # The live-updates channel strings the SSE relay routes rows to;
            # both sides import this, so a change must re-run both lanes.
            - packages/live-channels/**
            - pnpm-lock.yaml
            - .github/workflows/server-ci.yml

  server:
    name: Check server
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest

    # Backs the *.int.test.ts tier (ADR 0017 Track B): DB-boundary
    # integration tests run per PR against a real Postgres. Unit tests
    # never touch it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        shell: bash
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      # The server links @popcharts/protocol as TypeScript source, whose own
      # imports (viem, generated metadata) resolve from protocol/node_modules
      # — install the workspace before the server's bun install.
      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: OpenAPI check
        run: bun run openapi:check

      - name: Tests with coverage
        run: bun run test:coverage

      - name: Integration tests (real Postgres)
        env:
          POPCHARTS_INT_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: bun run test:integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/lcov.info
          retention-days: 14
