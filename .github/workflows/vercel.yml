name: Vercel Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/vercel.yml
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/vercel.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"
  VERCEL_CLI_VERSION: "54.13.0"
  VERCEL_ENVIRONMENT: ${{ github.event_name == 'push' && 'production' || 'preview' }}

jobs:
  deploy:
    name: Deploy app to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    environment:
      name: ${{ github.event_name == 'push' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets
        working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "Add the missing repository secrets documented in docs/deployment/vercel.md."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Vercel CLI
        working-directory: .
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Smoke test
        run: pnpm test:e2e:smoke

      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment="${VERCEL_ENVIRONMENT}" --token="${VERCEL_TOKEN}"

      - name: Build Vercel output
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          args=(build --token "${VERCEL_TOKEN}")
          if [ "${VERCEL_ENVIRONMENT}" = "production" ]; then
            args+=(--prod)
          fi

          vercel "${args[@]}"

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          args=(deploy --prebuilt --token "${VERCEL_TOKEN}")
          if [ "${VERCEL_ENVIRONMENT}" = "production" ]; then
            args+=(--prod)
          fi

          output="$(vercel "${args[@]}")"
          echo "${output}"

          url="$(printf '%s\n' "${output}" | grep -Eo 'https://[^[:space:]]+' | grep -v '^https://vercel.com/' | tail -n 1 || true)"
          if [ -z "${url}" ]; then
            echo "::error::Could not find a deployment URL in Vercel CLI output."
            exit 1
          fi

          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Vercel Deployment"
            echo ""
            echo "- Environment: ${VERCEL_ENVIRONMENT}"
            echo "- URL: ${url}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment preview URL
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- popcharts-vercel-preview -->';
            const body = [
              marker,
              `Vercel preview is ready: ${process.env.DEPLOYMENT_URL}`,
              '',
              `Commit: \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.data.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
