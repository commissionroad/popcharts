name: App CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single source of truth for which paths this CI cares about. The
      # workflow always triggers; this job decides whether the real job runs.
      # A conditionally skipped job satisfies required status checks, so no
      # skip-twin workflow is needed (and none exists to drift out of sync).
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            relevant:
            - app/**
            - packages/api-client/**
            # The live-updates channel strings the app subscribes with; a
            # change here alters which channels the client asks for.
            - packages/live-channels/**
            - protocol/src/**
            # App domain imports @popcharts/protocol subpaths that resolve to
            # protocol/scripts/shared (price policy, tick math) via package
            # exports; changes there alter the shipped app bundle.
            - protocol/scripts/shared/**
            - server/generated/openapi.json
            - pnpm-lock.yaml
            - pnpm-workspace.yaml
            - .github/workflows/app-ci.yml

  app:
    name: Check app
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check formatting
        run: pnpm format:check

      - name: Check generated API client
        working-directory: .
        run: pnpm --dir packages/api-client api:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage
          path: app/coverage/lcov.info
          retention-days: 14

      - name: Build
        run: pnpm build

      - name: Smoke test
        run: pnpm test:e2e:smoke

      # Retry data for the Test Observability PR comment (ADR 0017 Track A):
      # a test that passed only on retry is reported as flaky.
      - name: Upload e2e report
        uses: actions/upload-artifact@v4
        with:
          name: app-e2e-report
          path: app/playwright-report/report.json
          retention-days: 14
