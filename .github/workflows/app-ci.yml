name: App CI

on:
  pull_request:
    branches:
      - main
    paths:
      - app/**
      # The committed app ABI and API client are generated from these files;
      # run abi:check/api:check when they change. Mirror any path change in
      # app-ci-skip.yml.
      - protocol/src/generated/pregrad-manager.ts
      - server/generated/openapi.json
      - .github/workflows/app-ci.yml
  push:
    branches:
      - main
    paths:
      - app/**
      - protocol/src/generated/pregrad-manager.ts
      - server/generated/openapi.json
      - .github/workflows/app-ci.yml

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  app:
    name: Check app
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check formatting
        run: pnpm format:check

      - name: Check generated contract ABIs
        run: pnpm abi:check

      - name: Check generated API client
        run: pnpm api:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage
          path: app/coverage/lcov.info
          retention-days: 14

      - name: Build
        run: pnpm build

      - name: Smoke test
        run: pnpm test:e2e:smoke
