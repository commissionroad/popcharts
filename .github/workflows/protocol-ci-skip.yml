# Companion to protocol-ci.yml for branch protection. See app-ci-skip.yml
# for why this exists.
name: Protocol CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - protocol/**
      - .github/workflows/protocol-ci.yml

permissions: {}

jobs:
  protocol:
    name: Check protocol
    runs-on: ubuntu-latest
    steps:
      - name: Skip (no protocol changes)
        run: 'echo "No protocol changes; check satisfied."'
