name: Infra CI

# Correctness gate only (ADR 0017 Track E): typecheck + cdk synth so a
# broken stack definition fails at review time instead of deploy time.
# Deployment pipelines remain ADR 0015's scope.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: infra-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single source of truth for which paths this CI cares about. The
      # workflow always triggers; this job decides whether the real job runs.
      # A conditionally skipped job satisfies required status checks, so no
      # skip-twin workflow is needed (and none exists to drift out of sync).
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            relevant:
            - infra/**
            # infra/tsconfig.json extends the repo-root base config.
            - tsconfig.base.json
            - .github/workflows/infra-ci.yml

  infra:
    name: Check infra
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      # infra/ is its own pnpm workspace with its own lockfile.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm build

      - name: Synthesize stacks
        run: pnpm synth --quiet
