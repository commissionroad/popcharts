name: Protocol CI

on:
  pull_request:
    branches:
      - main
    paths:
      - protocol/**
      - .github/workflows/protocol-ci.yml
  push:
    branches:
      - main
    paths:
      - protocol/**
      - .github/workflows/protocol-ci.yml

permissions:
  contents: read

concurrency:
  group: protocol-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  protocol:
    name: Check protocol
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Check formatting
        run: pnpm format:check

      - name: Lint Solidity
        run: pnpm lint:sol

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: protocol-coverage
          path: protocol/coverage/lcov.info
          retention-days: 14
