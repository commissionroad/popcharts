name: Protocol CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: protocol-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Single source of truth for which paths this CI cares about. The
      # workflow always triggers; this job decides whether the real job runs.
      # A conditionally skipped job satisfies required status checks, so no
      # skip-twin workflow is needed (and none exists to drift out of sync).
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            relevant:
            - protocol/**
            - scripts/**
            - pnpm-lock.yaml
            - pnpm-workspace.yaml
            - .github/workflows/protocol-ci.yml

  protocol:
    name: Check protocol
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        working-directory: .
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint Solidity
        run: pnpm lint:sol

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests with coverage
        run: pnpm test:coverage

      # TS SDK coverage (ADR 0017 Track G): c8 over the nodejs suite,
      # scoped to src/ minus generated/. --all keeps the denominator
      # honest — SDK modules no test ever loads still count as 0%, which
      # is the whole point of the figure. The lcov is copied next to the
      # Solidity one so both ship flat in the protocol-coverage artifact.
      - name: TS coverage
        run: |
          pnpm test:coverage:ts
          cp coverage-ts/lcov.info coverage/lcov-ts.info

      # Ratcheted floors (ADR 0017 Tracks D and G): never lower without
      # reviewer sign-off; bump as coverage lands. Hardhat and c8 have no
      # native threshold support here, so the gate is this step.
      - name: Enforce coverage floors
        working-directory: .
        run: |
          node --experimental-strip-types scripts/ci-check-coverage-floor.ts \
            --workspace protocol-solidity \
            --lcov protocol/coverage/lcov.info \
            --min-lines 96.67
          node --experimental-strip-types scripts/ci-check-coverage-floor.ts \
            --workspace protocol-ts \
            --lcov protocol/coverage/lcov-ts.info \
            --min-lines 36.3

      # protocol/src/generated is the ABI source of truth that server and app
      # import; a contract change that lands without regenerating it leaves
      # every consumer decoding against a stale ABI at runtime.
      - name: Check generated contract metadata
        run: pnpm metadata:check

      # The root local dev scripts drive the protocol deploy and market
      # creation helpers, so their typecheck and seam tests gate here.
      - name: Check root scripts
        working-directory: .
        run: pnpm run scripts:check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: protocol-coverage
          # Both files share protocol/coverage/ so the artifact stays flat:
          # lcov.info (Solidity) and lcov-ts.info (TS SDK) side by side.
          path: |
            protocol/coverage/lcov.info
            protocol/coverage/lcov-ts.info
          retention-days: 14
